<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A minimalist desktop search launcher with commands and custom search engines.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>SimpleSearch</title>
</head>

<body>
  <main class="shell">
    <form id="search-form" action="https://www.google.com/search" method="get" autocomplete="off">
      <div class="input-wrapper">
        <div id="measure" class="measure typo"></div>
        <div class="idle-caret"></div>
        <input id="q" type="text" name="q" class="typo" autofocus autocomplete="off" spellcheck="false" aria-label="搜索">
      </div>
    </form>
  </main>

  <section id="help-panel" class="panel help-panel" aria-label="帮助" hidden>
    <div class="help-content">
      <div>
        <h2>搜索引擎</h2>
        <dl id="engine-help" class="help-list"></dl>
      </div>
      <div>
        <h2>命令</h2>
        <dl id="command-help" class="help-list"></dl>
      </div>
      <div>
        <h2>快捷键</h2>
        <dl id="shortcut-help" class="help-list"></dl>
      </div>
    </div>
  </section>

  <section id="settings-panel" class="panel settings-panel" aria-label="设置" hidden>
    <div class="settings-content">
      <section class="settings-group custom-engine-section">
        <div class="settings-group-header">
          <h2>自定义搜索引擎</h2>
          <p id="custom-engine-state" class="custom-engine-state" aria-live="polite"></p>
        </div>
        <form id="custom-engine-form" class="custom-engine-form" autocomplete="off">
          <label>
            <span>命令</span>
            <input id="custom-engine-key" type="text" maxlength="16" spellcheck="false" autocomplete="off" placeholder="site">
          </label>
          <label>
            <span>名称</span>
            <input id="custom-engine-label" type="text" maxlength="32" spellcheck="false" autocomplete="off" placeholder="搜索">
          </label>
          <label class="template-field">
            <span>URL（用 %s 代替搜索字词）</span>
            <input id="custom-engine-template" type="text" maxlength="2048" spellcheck="false" autocomplete="off" placeholder="https://search.example.com?q=%s">
          </label>
          <label class="color-field">
            <span>颜色</span>
            <input id="custom-engine-color" type="text" maxlength="7" spellcheck="false" autocomplete="off" value="#111111" placeholder="#ff8800" aria-label="闪烁颜色">
          </label>
          <button id="custom-engine-submit" class="choice-button add-engine-button" type="submit">添加</button>
        </form>
        <button id="custom-engine-cancel" class="choice-button cancel-engine-button" type="button" hidden>取消编辑</button>
        <div id="custom-engine-error" class="custom-engine-error" aria-live="polite" role="alert"></div>
        <div id="custom-engine-list" class="custom-engine-list"></div>
      </section>
    </div>
  </section>

  <script type="module" src="src/app.js"></script>
</body>

</html>
