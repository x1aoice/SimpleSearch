<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A minimalist desktop search launcher with commands and calculator hints.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>SimpleSearch</title>
</head>

<body>
  <main class="shell">
    <form id="search-form" action="https://www.google.com/search" method="get" autocomplete="off">
      <div class="input-wrapper">
        <div id="measure" class="measure typo"></div>
        <div class="idle-caret"></div>
        <div id="ghost" class="ghost-text typo" aria-hidden="true"></div>
        <input id="q" type="text" name="q" class="typo" autofocus autocomplete="off" spellcheck="false" aria-label="搜索">
      </div>
    </form>
  </main>

  <section id="help-panel" class="panel help-panel" aria-label="帮助" hidden>
    <div class="panel-header">
      <h1>SimpleSearch</h1>
      <button id="help-close" class="icon-button" type="button" aria-label="关闭帮助">x</button>
    </div>
    <div class="help-content">
      <div>
        <h2>搜索引擎</h2>
        <dl id="engine-help" class="help-list"></dl>
      </div>
      <div>
        <h2>命令</h2>
        <dl id="command-help" class="help-list"></dl>
      </div>
      <div>
        <h2>快捷键</h2>
        <dl id="shortcut-help" class="help-list"></dl>
      </div>
    </div>
  </section>

  <section id="settings-panel" class="panel settings-panel" aria-label="设置" hidden>
    <div class="panel-header">
      <h1>设置</h1>
      <button id="settings-close" class="icon-button" type="button" aria-label="关闭设置">x</button>
    </div>
    <div class="settings-content">
      <section class="settings-group">
        <h2>搜索引擎</h2>
        <div id="settings-engines" class="choice-grid"></div>
      </section>
      <section class="settings-group">
        <h2>主题</h2>
        <div id="settings-themes" class="choice-row"></div>
      </section>
    </div>
  </section>

  <script type="module" src="src/app.js"></script>
</body>

</html>
